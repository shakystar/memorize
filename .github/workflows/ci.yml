name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  # Versioning is owned by release-please (see issue #97). Contributors must
  # never bump package.json `version` in a feature PR — let the Release PR do
  # it. Skipped on the release-please--* branch where the bump is expected.
  version-guard:
    if: github.event_name == 'pull_request' && !startsWith(github.head_ref, 'release-please--')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Reject manual version bumps
        run: |
          base="${{ github.event.pull_request.base.sha }}"
          git show "$base:package.json" > base-package.json
          old=$(node -p "require('./base-package.json').version")
          new=$(node -p "require('./package.json').version")
          rm -f base-package.json
          echo "base version: $old"
          echo "head version: $new"
          if [ "$old" != "$new" ]; then
            echo "::error file=package.json::PRs must not change package.json version ($old -> $new). Versioning is automated by release-please — use Conventional Commits (feat/fix/feat!) and let the Release PR bump the version."
            exit 1
          fi
          echo "OK: version unchanged."

  lint-typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm lint

  # Node is pinned to 22 (no Node 20). better-sqlite3/SQLite and
  # package.json `engines.node` ">=22" require Node 22+; #14's Node-20 matrix
  # entry was intentionally dropped for this reason.
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm test:unit
      - run: pnpm test:smoke
      - run: pnpm test:integration
      - run: pnpm test:golden

  # Also run on Windows so the Windows-sensitive build steps — pnpm build
  # (write-cli-shebang) and pnpm pack:check (tarball packing) — are exercised
  # there too, not just on ubuntu.
  build:
    needs: lint-typecheck
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: pnpm pack:check
      # One copy of the build output suffices; upload only from ubuntu to avoid
      # a duplicate-artifact-name collision across matrix legs.
      - if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 7
