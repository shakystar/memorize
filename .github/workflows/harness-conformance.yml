name: harness-conformance

# Verifies memorize's integration against the REAL agent-harness CLIs in a
# container. Scheduled so an upstream harness change (config schema/paths,
# plugin API) surfaces as a red check instead of silent drift. Tier A/A' only
# (model-free); live capture (tier B) is run manually with a provider secret.

on:
  workflow_dispatch:
    inputs:
      harness:
        description: harness id (must exist in src/harness/registry.ts)
        required: true
        default: opencode
  # Runs when harness-integration code changes, so a PR that breaks a harness
  # adapter fails its own conformance check (catches breakage at the source).
  pull_request:
    paths:
      - 'src/harness/**'
      - 'src/adapters/**'
      - 'src/services/install-service.ts'
      - 'src/services/agent-detect.ts'
      - 'docker/conformance/**'
      - '.github/workflows/harness-conformance.yml'
  schedule:
    # Weekly, Monday 06:00 UTC — catch upstream harness releases.
    - cron: '0 6 * * 1'

jobs:
  conformance:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Add harness ids here as descriptors land in docker/conformance/harnesses/.
        harness: ${{ github.event_name == 'workflow_dispatch' && fromJSON(format('["{0}"]', github.event.inputs.harness)) || fromJSON('["opencode"]') }}
    steps:
      - uses: actions/checkout@v4
      - name: Build conformance image
        run: docker build -f docker/conformance/Dockerfile -t memorize-conformance .
      - name: Run conformance (tier B auto-enables when ANTHROPIC_API_KEY secret exists)
        env:
          # memorize capture is LLM-free; this key only lets opencode perform one
          # tool call in tier B. Absent → tiers A/A' only (live capture skips).
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          ARGS=(--rm)
          if [ -n "$ANTHROPIC_API_KEY" ]; then
            echo "tier B: live capture ENABLED (provider secret present)"
            ARGS+=(-e OPENCODE_CONFORMANCE_LIVE=1 -e 'OPENCODE_MODEL=anthropic/claude-haiku-4-5' -e ANTHROPIC_API_KEY)
          else
            echo "tier B: SKIPPED (no ANTHROPIC_API_KEY secret)"
          fi
          docker run "${ARGS[@]}" memorize-conformance ${{ matrix.harness }}
