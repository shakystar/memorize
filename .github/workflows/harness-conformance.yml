name: harness-conformance

# Verifies memorize's integration against the REAL agent-harness CLIs in a
# container. Scheduled so an upstream harness change (config schema/paths,
# plugin API) surfaces as a red check instead of silent drift. Tier A/A' only
# (model-free); live capture (tier B) is run manually with a provider secret.

on:
  workflow_dispatch:
    inputs:
      harness:
        description: harness id (must exist in src/harness/registry.ts)
        required: true
        default: opencode
  # Runs when harness-integration code changes, so a PR that breaks a harness
  # adapter fails its own conformance check (catches breakage at the source).
  pull_request:
    paths:
      - 'src/harness/**'
      - 'src/adapters/**'
      - 'src/services/install-service.ts'
      - 'src/services/agent-detect.ts'
      - 'docker/conformance/**'
      - '.github/workflows/harness-conformance.yml'
  schedule:
    # Weekly, Monday 06:00 UTC — catch upstream harness releases.
    - cron: '0 6 * * 1'

jobs:
  conformance:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Add harness ids here as descriptors land in docker/conformance/harnesses/.
        harness: ${{ github.event_name == 'workflow_dispatch' && fromJSON(format('["{0}"]', github.event.inputs.harness)) || fromJSON('["opencode","gemini","pi","hermes","cursor"]') }}
    steps:
      - uses: actions/checkout@v4
      - name: Build conformance image
        run: docker build -f docker/conformance/Dockerfile -t memorize-conformance .
      - name: Run conformance (tier B auto-enables when a provider secret exists)
        env:
          # memorize capture is LLM-free; these keys only let the harness perform
          # one tool call in tier B. Absent → deterministic tiers only.
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          # cursor-agent headless auth (cursor.com/docs/cli/github-actions).
          CURSOR_API_KEY: ${{ secrets.CURSOR_API_KEY }}
        run: |
          ARGS=(--rm)
          EVENT='${{ github.event_name }}'
          LIVE=0
          { [ "$EVENT" = schedule ] || [ "$EVENT" = workflow_dispatch ]; } && LIVE=1
          # Cost/flake control: the model-driven tier B runs on schedule/manual
          # only. PRs get the deterministic, model-free tiers (A/A'/A'').
          if [ -n "$ANTHROPIC_API_KEY" ] && [ "$LIVE" = 1 ]; then
            echo "tier B: live capture ENABLED ($EVENT, Anthropic secret present)"
            # Each harness script reads only its own *_CONFORMANCE_LIVE flag, so
            # passing the whole set is harmless across the matrix. Both opencode
            # and pi drive an Anthropic model with the same ANTHROPIC_API_KEY.
            # Hermes live is intentionally NOT enabled: its installer bundles a
            # heavy runtime and a live run needs a Nous provider key we don't
            # hold — its deterministic synthetic tier covers the memorize side.
            ARGS+=(-e OPENCODE_CONFORMANCE_LIVE=1 -e 'OPENCODE_MODEL=anthropic/claude-haiku-4-5')
            ARGS+=(-e PI_CONFORMANCE_LIVE=1 -e 'PI_MODEL=anthropic/claude-haiku-4-5')
            ARGS+=(-e ANTHROPIC_API_KEY)
          else
            echo "tier B (Anthropic-driven): SKIPPED (deterministic tiers only on $EVENT; model runs on schedule/dispatch)"
          fi
          # Cursor: tier B (live cursor-agent capture) needs CURSOR_API_KEY; tier C
          # (upstream-contract drift) needs only network. Both gated to schedule/
          # dispatch. cursor.sh keys its real install + live check on CURSOR_API_KEY.
          if [ "$LIVE" = 1 ]; then
            echo "tier C: cursor upstream-contract check ENABLED ($EVENT)"
            ARGS+=(-e CURSOR_CONFORMANCE_LIVE=1)
            if [ -n "$CURSOR_API_KEY" ]; then
              echo "tier B: cursor live capture ENABLED ($EVENT, CURSOR_API_KEY present)"
              ARGS+=(-e CURSOR_API_KEY)
            else
              echo "tier B: cursor live capture SKIPPED (no CURSOR_API_KEY secret)"
            fi
          else
            echo "tier B/C (cursor): SKIPPED (run on schedule/dispatch)"
          fi
          docker run "${ARGS[@]}" memorize-conformance ${{ matrix.harness }}
