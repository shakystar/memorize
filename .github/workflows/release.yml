name: Release

# Publishes to npm whenever the version in package.json changes on main.
# Auth: npm OIDC Trusted Publishing (no NPM_TOKEN secret) — provenance is automatic.
# Idempotent: if the version is already on npm, the run no-ops.

on:
  push:
    branches: [main]
    paths:
      - package.json

permissions:
  contents: write # create git tag + GitHub release
  id-token: write # npm OIDC trusted publishing

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Resolve version
        id: ver
        run: echo "version=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Skip if already published
        id: check
        run: |
          if npm view "@shakystar/memorize@${{ steps.ver.outputs.version }}" version >/dev/null 2>&1; then
            echo "published=true" >> "$GITHUB_OUTPUT"
            echo "::notice::v${{ steps.ver.outputs.version }} is already on npm — skipping release."
          else
            echo "published=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Install
        if: steps.check.outputs.published == 'false'
        run: pnpm install --frozen-lockfile

      - name: Build
        if: steps.check.outputs.published == 'false'
        run: pnpm build

      - name: Verify package contents
        if: steps.check.outputs.published == 'false'
        run: pnpm pack:check

      - name: Test
        if: steps.check.outputs.published == 'false'
        run: pnpm test

      # OIDC trusted publishing requires npm >= 11.5.1.
      - name: Upgrade npm for OIDC
        if: steps.check.outputs.published == 'false'
        run: npm install -g npm@latest

      - name: Publish to npm
        if: steps.check.outputs.published == 'false'
        run: npm publish

      - name: Extract release notes from CHANGELOG
        if: steps.check.outputs.published == 'false'
        id: notes
        run: |
          version="${{ steps.ver.outputs.version }}"
          # Print the body under "## [<version>]" up to the next "## [" heading.
          awk -v v="$version" '
            $0 ~ "^## \\[" v "\\]" { capture=1; next }
            capture && /^## \[/ { exit }
            capture { print }
          ' CHANGELOG.md > release-notes.md
          if [ ! -s release-notes.md ]; then
            echo "See [CHANGELOG.md](CHANGELOG.md)." > release-notes.md
          fi

      - name: Tag + GitHub Release
        if: steps.check.outputs.published == 'false'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          version="${{ steps.ver.outputs.version }}"
          git tag "v$version"
          git push origin "v$version"
          gh release create "v$version" \
            --title "v$version" \
            --notes-file release-notes.md \
            --verify-tag
