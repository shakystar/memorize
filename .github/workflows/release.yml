name: Release

# Canonical release automation (see issue #97 + .github/CONTRIBUTING.md).
# release-please computes the next version from Conventional Commits on main,
# maintains a Release PR + CHANGELOG, and on merge cuts the tag + GitHub
# Release. The publish job then ships to npm via OIDC Trusted Publishing
# (no NPM_TOKEN; provenance attached).

on:
  push:
    branches: [main]
  # Manual dev-channel snapshot (publish-dev below). Touches no
  # release-please state — safe to dispatch at any time.
  workflow_dispatch:
    inputs:
      base:
        description: 'Version line the snapshot belongs to (X.Y.Z, no prerelease part)'
        required: false
        default: '3.0.0'

permissions: {}

jobs:
  release-please:
    if: ${{ github.event_name == 'push' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          # A PR created by the built-in GITHUB_TOKEN does NOT trigger other
          # workflows (GitHub's loop-prevention rule), so the Release PR would
          # run ZERO CI — a problem the day main gains required status checks
          # (#143). Prefer a provisioned token (fine-grained PAT or App token,
          # Contents + Pull requests: read/write) stored as RELEASE_PLEASE_TOKEN
          # so the Release PR runs ci.yml like any other PR. Falls back to
          # GITHUB_TOKEN when the secret is absent, so releases keep working
          # regardless of whether the token has been provisioned yet.
          token: ${{ secrets.RELEASE_PLEASE_TOKEN || secrets.GITHUB_TOKEN }}

  publish:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # npm OIDC trusted publishing
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: pnpm pack:check
      # OIDC trusted publishing requires npm >= 11.5.1.
      - run: npm install -g npm@latest
      - run: npm publish --provenance --access public

  # Dev-channel snapshot: manually dispatched, publishes
  # <base>-dev.<run_number> to the npm `dev` dist-tag (`latest` untouched).
  # Lives in THIS file because npm Trusted Publishing binds the package to a
  # single workflow path (release.yml) — a separate workflow could not
  # publish. The version exists only in the runner: the repo's package.json
  # stays unchanged (ci.yml version-guard forbids manual bumps) and no tag,
  # CHANGELOG entry, or release-please state is created, so the stable
  # channel is unaffected. run_number is monotonic per workflow, so snapshot
  # versions never collide.
  publish-dev:
    if: ${{ github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # npm OIDC trusted publishing
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: pnpm pack:check
      - name: Stamp snapshot version (runner-only, never committed)
        run: npm version "${{ inputs.base }}-dev.${{ github.run_number }}" --no-git-tag-version
      # OIDC trusted publishing requires npm >= 11.5.1.
      - run: npm install -g npm@latest
      - run: npm publish --provenance --access public --tag dev
