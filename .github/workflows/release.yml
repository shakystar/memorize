name: Release

# Canonical release automation (see issue #97 + .github/CONTRIBUTING.md).
# release-please computes the next version from Conventional Commits on main,
# maintains a Release PR + CHANGELOG, and on merge cuts the tag + GitHub
# Release. The publish job then ships to npm via OIDC Trusted Publishing
# (no NPM_TOKEN; provenance attached).

on:
  push:
    branches: [main]

permissions: {}

jobs:
  release-please:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          # A PR created by the built-in GITHUB_TOKEN does NOT trigger other
          # workflows (GitHub's loop-prevention rule), so the Release PR would
          # run ZERO CI — a problem the day main gains required status checks
          # (#143). Prefer a provisioned token (fine-grained PAT or App token,
          # Contents + Pull requests: read/write) stored as RELEASE_PLEASE_TOKEN
          # so the Release PR runs ci.yml like any other PR. Falls back to
          # GITHUB_TOKEN when the secret is absent, so releases keep working
          # regardless of whether the token has been provisioned yet.
          token: ${{ secrets.RELEASE_PLEASE_TOKEN || secrets.GITHUB_TOKEN }}

  publish:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # npm OIDC trusted publishing
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: pnpm pack:check
      # OIDC trusted publishing requires npm >= 11.5.1.
      - run: npm install -g npm@latest
      - run: npm publish --provenance --access public
